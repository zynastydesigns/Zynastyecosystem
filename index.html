  /* ---- Header ---- */
  header{
    background:var(--ink);color:var(--paper);
    padding:22px 24px 20px;
    position:sticky;top:0;z-index:20;
    border-bottom:1px solid var(--line-dark);
  }
  .header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
  .brand{display:flex;align-items:center;gap:14px;}
  .brand img{height:52px;width:52px;object-fit:contain;flex-shrink:0;}
  .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.16em;color:var(--brass);text-transform:uppercase;margin-bottom:4px;}
  .wordmark{font-family:'Fraunces',serif;font-size:26px;font-weight:500;letter-spacing:-.01em;line-height:1.1;}
  .wordmark .apos{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.2em;color:#9AA7AF;display:block;margin-top:2px;text-transform:uppercase;}
  .tabs{display:flex;gap:2px;background:var(--ink-2);border-radius:8px;padding:3px;}
  .tab-btn{
    font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.06em;text-transform:uppercase;
    background:transparent;border:none;color:var(--slate);padding:9px 16px;border-radius:6px;cursor:pointer;transition:.15s;
  }
  .tab-btn.active{background:var(--paper);color:var(--ink);}
  .tab-btn:not(.active):hover{color:var(--paper);}

  main{max-width:1100px;margin:0 auto;padding:28px 24px 80px;}

  /* ---- Toolbar ---- */
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:24px;}
  .toolbar input[type=text], .toolbar select{
    font-family:'IBM Plex Sans',sans-serif;font-size:14px;
    border:1px solid var(--line);background:#fff;border-radius:6px;padding:10px 12px;color:var(--ink);
  }
  .toolbar input[type=text]{flex:1;min-width:180px;}
  .btn{
    font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.05em;text-transform:uppercase;
    background:var(--ink);color:var(--paper);border:none;border-radius:6px;padding:11px 18px;cursor:pointer;transition:.15s;
  }
  .btn:hover{background:var(--ink-2);}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line);}
  .btn.ghost:hover{border-color:var(--ink);}
  .btn.danger{background:transparent;color:var(--clay);border:1px solid var(--clay);}
  .btn.danger:hover{background:var(--clay);color:#fff;}

  /* ---- Empty state ---- */
  .empty{
    border:1px dashed var(--line);border-radius:10px;padding:60px 24px;text-align:center;color:var(--slate);
  }
  .empty .display{font-size:22px;color:var(--ink);margin-bottom:8px;}

  /* ---- Ruler (signature element) ---- */
  .ruler{position:relative;padding:20px 10px 26px;}
  .ruler-line-wrap{position:relative;height:16px;}
  .ruler-track{position:absolute;top:50%;left:0;right:0;height:2px;background:var(--line);border-radius:2px;transform:translateY(-50%);}
  .ruler-fill{position:absolute;top:0;left:0;height:100%;border-radius:2px;transition:width .3s;}
  .tick{position:absolute;top:50%;width:11px;height:11px;border-radius:50%;background:var(--paper);border:2px solid var(--line);transform:translate(-50%,-50%);}
  .tick.done{border-color:var(--brass);background:var(--brass);}
  .tick.current{width:15px;height:15px;box-shadow:0 0 0 4px rgba(169,129,79,.18);}
  .tick-label{position:absolute;top:calc(50% + 16px);font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.03em;color:var(--slate);white-space:normal;text-align:center;transform:translateX(-50%);width:max-content;max-width:140px;line-height:1.3;}
  .tick-label.current-label{color:var(--ink);font-weight:600;letter-spacing:.05em;}
  .ruler.large .ruler-line-wrap{height:22px;}
  .ruler.large .tick{width:16px;height:16px;}
  .ruler.large .tick.current{width:22px;height:22px;}
  .ruler.large .tick-label{font-size:12px;top:calc(50% + 22px);}
  .ruler.large{padding-bottom:44px;}
  @media(max-width:420px){
    .ruler.large .tick-label{font-size:11px;}
    .tick-label{max-width:110px;}
  }

  /* ---- Project cards ---- */
  .grid{display:grid;grid-template-columns:1fr;gap:16px;}
  @media(min-width:720px){.grid{grid-template-columns:1fr 1fr;}}
  .card{
    background:#fff;border:1px solid var(--line);border-radius:10px;padding:20px 20px 16px;
    cursor:pointer;transition:.15s;position:relative;
  }
  .card:hover{border-color:var(--brass);box-shadow:0 2px 10px rgba(27,36,48,.06);}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:2px;}
  .card-title{font-family:'Fraunces',serif;font-size:19px;font-weight:500;}
  .card-client{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--slate);margin-top:2px;}
  .pill{
    font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.05em;text-transform:uppercase;
    padding:4px 9px;border-radius:20px;color:#fff;white-space:nowrap;flex-shrink:0;
  }
  .facts{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;margin:16px 0 4px;padding-top:14px;border-top:1px solid var(--line);}
  .fact-label{font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--slate);}
  .fact-val{font-size:13.5px;margin-top:2px;}
  .card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:12px;border-top:1px solid var(--line);}
  .code-chip{font-family:'IBM Plex Mono',monospace;font-size:11px;background:var(--paper-2);padding:5px 9px;border-radius:5px;letter-spacing:.04em;}
  .icon-btn{background:none;border:none;color:var(--slate);cursor:pointer;font-size:13px;padding:4px 6px;}
  .icon-btn:hover{color:var(--clay);}

  /* ---- Modal / editor ---- */
  .overlay{position:fixed;inset:0;background:rgba(27,36,48,.5);display:flex;align-items:flex-start;justify-content:center;padding:30px 16px;overflow-y:auto;z-index:50;}
  .modal{background:var(--paper);border-radius:12px;max-width:600px;width:100%;padding:28px;margin-top:10px;}
  .modal h2{font-family:'Fraunces',serif;font-size:22px;margin:0 0 18px;}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  @media(max-width:520px){.field-row{grid-template-columns:1fr;}}
  .field{display:flex;flex-direction:column;gap:5px;}
  .field.full{grid-column:1/-1;}
  label{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--slate);}
  input, select, textarea{
    font-family:'IBM Plex Sans',sans-serif;font-size:14px;border:1px solid var(--line);border-radius:6px;
    padding:9px 11px;background:#fff;color:var(--ink);width:100%;
  }
  textarea{resize:vertical;min-height:60px;}
  .section-label{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--brass);margin:20px 0 10px;padding-top:14px;border-top:1px solid var(--line);}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:22px;}

    max-width:480px;margin:40px auto;text-align:center;color:#fff;border-radius:16px;

  .lookup .display{font-size:26px;margin-bottom:8px;color:#fff;}
  .lookup p{color:#C9D3DA;font-size:14px;margin-bottom:24px;}
  .lookup-form{display:flex;gap:8px;}
  .lookup-form input{text-align:center;letter-spacing:.1em;text-transform:uppercase;background:rgba(255,255,255,.96);}
  .error-msg{color:#F3A98F;font-size:13px;margin-top:14px;font-family:'IBM Plex Mono',monospace;}

  .portal-hero{background:var(--ink);color:var(--paper);border-radius:12px;padding:32px 28px 8px;margin-bottom:20px;}
  .portal-hero .greeting{font-size:15px;color:var(--paper);opacity:.85;margin-bottom:8px;}
  .portal-hero .eyebrow{margin-bottom:10px;}
  .portal-hero h1{font-family:'Fraunces',serif;font-size:30px;font-weight:500;margin:0 0 4px;}
  .portal-hero .addr{color:#fff;font-weight:700;letter-spacing:.02em;font-size:14px;margin-bottom:6px;}
  .portal-hero .ruler-track{background:var(--line-dark);}
  .portal-hero .tick{background:var(--ink);border-color:var(--line-dark);}
  .portal-hero .tick-label{color:#9AA7AF;}

  .portal-grid{display:grid;grid-template-columns:1fr;gap:14px;}
  @media(min-width:640px){.portal-grid{grid-template-columns:1fr 1fr;}}
  .portal-box{background:#fff;border:1px solid var(--line);border-radius:10px;padding:18px 20px;}
  .portal-box h3{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--slate);margin:0 0 12px;}
  .portal-box .big{font-family:'Fraunces',serif;font-size:22px;}
  .back-link{background:none;border:none;color:#fff;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;letter-spacing:.04em;cursor:pointer;margin-bottom:16px;padding:0;text-shadow:0 1px 3px rgba(0,0,0,.45);}
  .back-link:hover{color:var(--paper);}

  /* ---- Toast ---- */
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);
    padding:12px 20px;border-radius:8px;font-size:13px;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,.2);
    max-width:90vw;text-align:center;}
  .toast.error{background:var(--clay);}

  /* ---- Confirm dialog ---- */
  .confirm-box{max-width:380px;}
  .confirm-box p{font-size:14px;line-height:1.5;margin:0 0 20px;}

  /* ---- Quotation Builder ---- */
  .quote-header{margin-bottom:20px;}
  .quote-header .eyebrow{color:var(--brass);}
  .quote-header h1{font-family:'Fraunces',serif;font-size:26px;font-weight:500;margin:2px 0 2px;}
  .quote-header .sub{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--slate);}
  .quote-table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  .quote-table th{
    font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--slate);
    text-align:left;padding:10px 8px;background:var(--paper-2);border-bottom:1px solid var(--line);
  }
  .quote-table td{padding:8px;border-bottom:1px solid var(--line);vertical-align:middle;}
  .quote-table tr:last-child td{border-bottom:none;}
  .quote-table input, .quote-table select{font-size:13px;padding:7px 8px;}
  .quote-amt{font-family:'IBM Plex Mono',monospace;font-size:13.5px;white-space:nowrap;text-align:right;padding-right:10px;}
  .quote-remove{background:none;border:none;color:var(--slate);cursor:pointer;font-size:15px;padding:4px;}
  .quote-remove:hover{color:var(--clay);}
  .quote-scroll{overflow-x:auto;border-radius:10px;}
  .quote-summary{max-width:340px;margin-left:auto;margin-top:18px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px 18px;}
  .quote-row{display:flex;justify-content:space-between;align-items:center;font-size:13.5px;padding:6px 0;}
  .quote-row.total{border-top:1px solid var(--line);margin-top:6px;padding-top:12px;font-family:'Fraunces',serif;font-size:19px;}
  .quote-row label{font-family:'IBM Plex Sans',sans-serif;text-transform:none;letter-spacing:0;font-size:13.5px;color:var(--ink);}
  .quote-row input{width:70px;text-align:right;padding:5px 7px;font-size:13px;}
  .quote-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px;}

  /* ---- Quotation Item Card (Product / Features / Dimensions, descending) ---- */
  .item-card{position:relative;background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px 40px 16px 16px;margin-bottom:14px;}
  .item-remove-btn{position:absolute;top:12px;right:12px;font-size:16px;}
  .item-card .box{margin-bottom:12px;}
  .item-box-label{font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--brass);margin-bottom:5px;}
  .item-card .qi-name{
    font-family:'Fraunces',serif;font-size:17px;font-weight:500;border:1px solid var(--line);border-radius:6px;
    padding:9px 11px;width:100%;
  }
  .item-card .qi-features{font-size:13.5px;padding:8px 10px;width:100%;min-height:44px;}
  .dim-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .dim-row input{width:80px;font-size:13px;padding:7px 8px;}
  .dim-row select{width:100px;font-size:13px;padding:7px 8px;}
  .dim-x{color:var(--slate);font-size:13px;}
  .dim-result{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--sage);margin-left:4px;}
  .item-meta-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:14px;padding-top:14px;border-top:1px solid var(--line);}
  .item-meta-row select{font-size:13px;padding:7px 8px;}
  .item-meta-row .qi-cat{flex:1 1 130px;min-width:120px;}
  .item-meta-row .qi-unit{width:80px;}
  .item-meta-row .qi-qty{width:70px;font-size:13px;padding:7px 8px;}
  .item-meta-row .qi-rate{width:90px;font-size:13px;padding:7px 8px;}
  .item-meta-row .qi-qty[readonly]{background:var(--paper-2);color:var(--slate);}
  .item-amt-badge{font-family:'IBM Plex Mono',monospace;font-size:13.5px;font-weight:500;margin-left:auto;white-space:nowrap;}
  .hf-row{display:flex;gap:8px;flex-wrap:wrap;}
  .hf-row select{flex:1;min-width:150px;font-size:13px;padding:8px 10px;}

  /* ---- Rooms ---- */
  .room-section{margin-bottom:22px;}
  .room-header{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid var(--brass);}
  .room-title{font-family:'Fraunces',serif;font-size:19px;font-weight:500;}
  .room-title .room-count{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--slate);margin-left:8px;letter-spacing:.03em;}
  .room-actions{display:flex;gap:10px;flex-wrap:wrap;margin:2px 0 20px;}
  .rooms-toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:20px;}
  .room-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
  @media(max-width:480px){.room-type-grid{grid-template-columns:1fr;}}
  .room-type-btn{
    font-family:'IBM Plex Sans',sans-serif;font-size:13.5px;text-align:left;
    background:#fff;border:1px solid var(--line);border-radius:8px;padding:10px 12px;cursor:pointer;transition:.15s;
  }
  .room-type-btn:hover{border-color:var(--brass);background:var(--paper-2);}

  /* ---- Item Presets ---- */
  .preset-table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  .preset-table th{
    font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--slate);
    text-align:left;padding:10px 8px;background:var(--paper-2);border-bottom:1px solid var(--line);
  }
  .preset-table td{padding:8px;border-bottom:1px solid var(--line);vertical-align:top;}
  .preset-table tr:last-child td{border-bottom:none;}
  .preset-table textarea{font-size:13px;padding:7px 8px;min-height:44px;}
  .preset-table input, .preset-table select{font-size:13px;padding:7px 8px;}
  .link-btn{background:none;border:none;color:var(--brass);font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.03em;text-transform:uppercase;cursor:pointer;padding:0;text-decoration:underline;}
  .link-btn:hover{color:var(--ink);}

  .picker-overlay{position:fixed;inset:0;background:rgba(27,36,48,.5);display:flex;align-items:flex-start;justify-content:center;padding:30px 16px;overflow-y:auto;z-index:60;}
  .picker-box{background:var(--paper);border-radius:12px;max-width:520px;width:100%;padding:22px;margin-top:10px;max-height:85vh;display:flex;flex-direction:column;}
  .picker-box h2{font-family:'Fraunces',serif;font-size:20px;margin:0 0 12px;}
  .picker-list{overflow-y:auto;border:1px solid var(--line);border-radius:8px;background:#fff;}
  .picker-item{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--line);cursor:pointer;text-align:left;background:none;border-left:none;border-right:none;border-top:none;width:100%;}
  .picker-item:last-child{border-bottom:none;}
  .picker-item:hover{background:var(--paper-2);}
  .picker-item .pd{font-size:13.5px;line-height:1.4;}
  .picker-item .pm{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--slate);white-space:nowrap;flex-shrink:0;}
</style>
</head>

const SUPABASE_URL = "https://quemdexciitxrmtbicae.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1ZW1kZXhjaWl0eHJtdGJpY2FlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4NzQ3NDcsImV4cCI6MjA5OTQ1MDc0N30.NNePZH__2lN9vx5RtnLFvL8rWMn6ifP2HiPfe6Kh2eE";
const SB_TABLE = "zynasty_storage";
const SB_HEADERS = { apikey: SUPABASE_ANON_KEY, Authorization: "Bearer " + SUPABASE_ANON_KEY };

async function sbFetchWithRetry(url, options, attempts){
  let lastErr;
  for(let i=0;i<attempts;i++){
    try{
      return await fetch(url, options);
    }catch(e){
      lastErr = e;
      if(i < attempts-1) await new Promise(r=>setTimeout(r, 350*(i+1)));
    }
  }
  throw lastErr;
}

  async get(key){

      const res = await sbFetchWithRetry(`${SUPABASE_URL}/rest/v1/${SB_TABLE}?key=eq.${encodeURIComponent(key)}&select=value`, { headers: SB_HEADERS }, 3);

      if(!rows || !rows.length) return null;
      return { key, value: rows[0].value };
    }catch(e){ console.error("Supabase get failed", e); return null; }
  },
  async set(key, value){
    try{
      const res = await sbFetchWithRetry(`${SUPABASE_URL}/rest/v1/${SB_TABLE}`, {
        method: "POST",
        headers: { ...SB_HEADERS, "Content-Type": "application/json", Prefer: "resolution=merge-duplicates,return=representation" },
        body: JSON.stringify([{ key, value }])
      }, 3);
      if(!res.ok) throw new Error(await res.text());
      return { key, value };
    }catch(e){ console.error("Supabase set failed", e); return null; }
  }
};

// Calls the update_client_project Postgres function (see project setup notes)
// instead of rewriting the entire "projects" blob directly. The function
// validates the access code and only allows a fixed set of client-facing
// fields to change, so a client can't tamper with contract values, internal
// notes, or other project data by crafting their own request.
async function updateClientProject(accessCode, updates){
  try{
    const res = await sbFetchWithRetry(`${SUPABASE_URL}/rest/v1/rpc/update_client_project`, {
      method: "POST",
      headers: { ...SB_HEADERS, "Content-Type": "application/json" },
      body: JSON.stringify({ p_access_code: accessCode, p_updates: updates })
    }, 3);
    if(!res.ok) throw new Error(await res.text());
    return true;
  }catch(e){ console.error("Could not update project", e); return false; }
}

function copyToClipboard(text, btnEl){
  const doFallback = () => {
    const ta = document.createElement("textarea");
    ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.select();
    try{ document.execCommand("copy"); }catch(e){}
    document.body.removeChild(ta);
  };
  const showCopied = () => {
    if(!btnEl) return;
    const orig = btnEl.textContent;
    btnEl.textContent = "Copied!";
    setTimeout(()=>{ btnEl.textContent = orig; }, 1500);
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(showCopied).catch(()=>{ doFallback(); showCopied(); });
  } else {
    doFallback(); showCopied();
  }
}
window.copyToClipboard = copyToClipboard;

async function downloadDesignPdf(kind, projectId, btnEl, noteEl, onSuccess){
  const key = "design-pdf:" + kind + ":" + projectId;

  btnEl.disabled = true;
  btnEl.textContent = "Preparing…";
  if(noteEl) noteEl.textContent = "";
  try{

    if(!res || !res.value){
      if(noteEl) noteEl.textContent = "Not ready yet — please check back soon.";
      return;
    }
    const a = document.createElement("a");
    a.href = res.value;
    a.download = (kind === "material" ? "Material-Selection" : "3D-Design-Renders") + ".pdf";
    document.body.appendChild(a);
    a.click();
    a.remove();
    if(typeof onSuccess === "function") await onSuccess();
  }catch(e){
    console.error(e);
    if(noteEl) noteEl.textContent = "Could not download right now — please try again.";
  }finally{
    btnEl.disabled = false;
    btnEl.textContent = originalText;
  }
}

function fmtMoney(v){
  if(v === "" || v === null || v === undefined) return "—";
  const n = Number(v);
  if(isNaN(n)) return "—";
  return "₹" + n.toLocaleString();
}
function fmtDate(d){
  if(!d) return "—";
  const dt = new Date(d + "T00:00:00");
  if(isNaN(dt)) return d;
  return dt.toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"});
}
function fmtTime(t){
  if(!t) return "—";
  const parts = String(t).split(":");
  if(parts.length < 2) return t;
  let h = parseInt(parts[0],10);
  const m = parts[1];
  if(isNaN(h)) return t;
  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12; if(h === 0) h = 12;
  return h + ":" + m + " " + ampm;
}

function renderRuler(stageIndex, large){
  const idx = Math.max(0, STAGES.indexOf(stageIndex));
  const pct = (idx / (STAGES.length-1)) * 100;
  const color = STAGE_COLORS[idx];
  const lastIdx = STAGES.length - 1;
  let ticks = STAGES.map((s,i)=>{
    const leftPct = (i / (STAGES.length-1)) * 100;
    const cls = i < idx ? "done" : i === idx ? "done current" : "";
    const style = i <= idx ? `border-color:${color};background:${color};` : "";
    const showLabel = large && i === idx;
    const dot = `<div class="tick ${cls}" style="left:${leftPct}%;${style}"></div>`;
    const edgeFix = i === 0 ? "transform:translateX(0);" : i === lastIdx ? "transform:translateX(-100%);" : "";
    const label = showLabel ? `<div class="tick-label current-label" style="left:${leftPct}%;${edgeFix}">${s}</div>` : "";
    return dot + label;
  }).join("");
  return `
    <div class="ruler ${large?'large':''}">
      <div class="ruler-line-wrap">
        <div class="ruler-track">
          <div class="ruler-fill" style="width:${pct}%;background:${color}"></div>
        </div>
        ${ticks}
      </div>
    </div>`;
}

// Looks up a project by access code, updates state/render, and — on success —
// remembers the code in this browser so a reload reopens the same project.
async function lookupProjectByCode(code){
  state.clientCode = code;
  const normalize = (s)=> (s||"").toUpperCase().replace(/[^A-Z0-9]/g,"");
  let match = state.projects.find(p=>normalize(p.accessCode) === normalize(code));
  if(!match){
    // The project list may be stale or missing if a prior sync attempt
    // failed (e.g. right after switching apps, before the network was
    // ready). Do one fresh reload before concluding it's really not found.
    await loadProjects();
    match = state.projects.find(p=>normalize(p.accessCode) === normalize(code));
  }
  if(match){
    state.clientResult = match;
    state.clientError = "";
    state.clientQuotationPdf = null;
    state.clientFinalQuotationPdf = null;
    state.onboardingStep = null;
    state.productionStep = null;
    saveClientSession(code);
    render();
    try{
      const res = await window.storage.get("quotation-pdf:" + match.id, true);
      state.clientQuotationPdf = res && res.value ? res.value : null;
    }catch(e){
      state.clientQuotationPdf = null;
    }
    try{
      const res2 = await window.storage.get("final-quotation-pdf:" + match.id, true);
      state.clientFinalQuotationPdf = res2 && res2.value ? res2.value : null;
    }catch(e){
      state.clientFinalQuotationPdf = null;
    }
    render();
    return true;
  } else {
    state.clientError = "We couldn't find a project with that code. Please check with your designer.";
    render();
    return false;
  }
}

      const addressInput = document.getElementById("kycAddressInput");
      const errBox = document.getElementById("kycErrorMsg");
      [nameInput, emailInput, aadhaarInput].forEach(el=>{ if(el) el.style.borderColor = ""; });
      const showErr = (msg, field)=>{
        if(errBox){ errBox.textContent = msg; errBox.style.display = "block"; } else { alert(msg); }
        if(field){ field.style.borderColor = "var(--clay)"; field.focus(); }
      };

      const fullName = (nameInput && nameInput.value.trim()) || "";
      const email = (emailInput && emailInput.value.trim()) || "";
      const aadhaarRaw = (aadhaarInput && aadhaarInput.value.trim()) || "";
      const aadhaarDigits = aadhaarRaw.replace(/\s|-/g,"");
      const file = fileInput && fileInput.files && fileInput.files[0];

      if(!fullName){ showErr("Please enter your full name.", nameInput); return; }
      if(!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ showErr("Please enter a valid email address.", emailInput); return; }
      if(!/^\d{12}$/.test(aadhaarDigits)){ showErr("Please enter a valid 12-digit Aadhaar number.", aadhaarInput); return; }
      if(!file){ showErr("Aadhaar card upload is mandatory — please attach a copy before submitting."); return; }

      if(errBox) errBox.style.display = "none";
      submitKyc.disabled = true;
      submitKyc.textContent = "Submitting…";
      try{
        const rawDataUrl = await new Promise((resolve,reject)=>{
          const reader = new FileReader();
          reader.onload = ()=>resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
        let dataUrl = rawDataUrl;
        if(file.type && file.type.startsWith("image/")){
          dataUrl = await new Promise((resolve)=>{
            const img = new Image();
            img.onload = ()=>{
              const maxDim = 1600;
              let w = img.width, h = img.height;
              if(w > maxDim || h > maxDim){
                const scale = maxDim / Math.max(w,h);
                w = Math.round(w*scale); h = Math.round(h*scale);
              }
              const canvas = document.createElement("canvas");
              canvas.width = w; canvas.height = h;
              canvas.getContext("2d").drawImage(img, 0, 0, w, h);
              resolve(canvas.toDataURL("image/jpeg", 0.8));
            };
            img.onerror = ()=>resolve(rawDataUrl);
            img.src = rawDataUrl;
          });
        }
        const docSaved = await window.storage.set("aadhaar-doc:" + p.id, dataUrl, true);
        if(!docSaved) throw new Error("Could not save Aadhaar document to storage.");
        p.kycFullName = fullName;
        p.kycEmail = email;
        p.kycAadhaarNumber = aadhaarDigits;
        p.kycAddress = (addressInput && addressInput.value.trim()) || "";
        p.kycCompleted = true;
        p.kycSubmittedAt = new Date().toISOString();
        const projectsSaved = await updateClientProject(p.accessCode, {
          kycFullName: p.kycFullName,
          kycEmail: p.kycEmail,
          kycAadhaarNumber: p.kycAadhaarNumber,
          kycAddress: p.kycAddress,
          kycCompleted: p.kycCompleted,
          kycSubmittedAt: p.kycSubmittedAt
        });
        if(!projectsSaved) throw new Error("Could not save updated project record.");
        render();
      }catch(e){
        console.error("Could not submit KYC details", e);
        showErr("Something went wrong submitting your KYC details. Please try again.");
        submitKyc.disabled = false;
        submitKyc.textContent = "Submit KYC Details";
      }
    };
  }

  const continueToDesign = document.getElementById("continueToDesignBtn");
  if(continueToDesign){
    continueToDesign.onclick = async ()=>{
      const p = state.clientResult;
      p.status = "Design Development";
      continueToDesign.disabled = true;
      continueToDesign.textContent = "Moving forward…";
      const ok = await updateClientProject(p.accessCode, { status: p.status });
      if(!ok) console.error("Could not move project to Design Development");
      state.onboardingStep = null;
      render();
    };
  }
  const designWelcomeNextBtn = document.getElementById("designWelcomeNextBtn");
  if(designWelcomeNextBtn){
    designWelcomeNextBtn.onclick = async ()=>{
      const p = state.clientResult;
      p.designWelcomeSeen = true;
      state.designStep = "designer";
      render();
      const ok = await updateClientProject(p.accessCode, { designWelcomeSeen: p.designWelcomeSeen });
      if(!ok) console.error("Could not save design welcome progress");
    };
  }

  const designerNextBtn = document.getElementById("designerNextBtn");
  if(designerNextBtn){
    designerNextBtn.onclick = async ()=>{
      const p = state.clientResult;
      p.designerIntroSeen = true;
      state.designStep = "progress";
      render();
      const ok = await updateClientProject(p.accessCode, { designerIntroSeen: p.designerIntroSeen });
      if(!ok) console.error("Could not save designer intro progress");
    };
  }

  // ---- Step-based progression handlers: Site Measurement → 3D Renders → Material Selection ----
  // Each caller passes only the fields it just changed on p, so the RPC's
  // allow-list stays the source of truth for what a client can touch.
  //
  // state.pendingSaves counts saves currently in flight. isRefreshUnsafe()
  // checks this so the background poll/focus refresh never fetches while a
  // save is still landing — otherwise it can win the race and overwrite the
  // just-set local value with the pre-save server copy, which is what made
  // "Next" buttons (e.g. Material Selection → Production) appear to snap
  // back to the previous step.
  async function saveClientProject(p, updates){
    state.pendingSaves = (state.pendingSaves || 0) + 1;
    try{
      const ok = await updateClientProject(p.accessCode, updates);
      if(!ok) console.error("Could not save progress");
    }finally{
      state.pendingSaves = Math.max(0, (state.pendingSaves || 1) - 1);
    }
  }

  const siteVisitForm = document.getElementById("siteVisitForm");
  if(siteVisitForm){
    siteVisitForm.onsubmit = async (e)=>{
      e.preventDefault();
      const fd = new FormData(e.target);
      const p = state.clientResult;
      p.siteVisitDate = fd.get("date");
      p.siteVisitTime = fd.get("time");
      p.siteVisitBookedAt = new Date().toISOString();
      render();
      await saveClientProject(p, { siteVisitDate: p.siteVisitDate, siteVisitTime: p.siteVisitTime, siteVisitBookedAt: p.siteVisitBookedAt });
    };
  }
  const changeSiteVisitBtn = document.getElementById("changeSiteVisitBtn");
  if(changeSiteVisitBtn){
    changeSiteVisitBtn.onclick = async ()=>{
      const p = state.clientResult;
      p.siteVisitDate = ""; p.siteVisitTime = ""; p.siteVisitBookedAt = "";
      p.siteVisitConfirmed = false; p.siteVisitConfirmedAt = "";
      p.siteMeasurementCompleted = false; p.siteMeasurementCompletedAt = "";
      render();
      await saveClientProject(p, {
        siteVisitDate: "", siteVisitTime: "", siteVisitBookedAt: "",
        siteVisitConfirmed: false, siteVisitConfirmedAt: "",
        siteMeasurementCompleted: false, siteMeasurementCompletedAt: ""
      });
    };
  }
  const siteVisitNextBtn = document.getElementById("siteVisitNextBtn");
  if(siteVisitNextBtn){
    siteVisitNextBtn.onclick = async ()=>{
      const p = state.clientResult;
      p.progressStep = "renders";
      render();
      await saveClientProject(p, { progressStep: p.progressStep });
    };
  }
  const downloadRendersBtn = document.getElementById("downloadRendersBtn");
  if(downloadRendersBtn){
    downloadRendersBtn.onclick = ()=> downloadDesignPdf("threeD", state.clientResult.id, downloadRendersBtn, document.getElementById("rendersDownloadNote"));
  }
  const rendersNextBtn = document.getElementById("rendersNextBtn");
  if(rendersNextBtn){
    rendersNextBtn.onclick = async ()=>{
      const p = state.clientResult;
      p.progressStep = "material";
      render();
      await saveClientProject(p, { progressStep: p.progressStep });
    };
  }
  const downloadMaterialBtn = document.getElementById("downloadMaterialBtn");
  if(downloadMaterialBtn){
    downloadMaterialBtn.onclick = ()=> downloadDesignPdf("material", state.clientResult.id, downloadMaterialBtn, document.getElementById("materialDownloadNote"), async ()=>{
      const p = state.clientResult;
      if(!p.materialSelectionDownloadedAt){
        p.materialSelectionDownloadedAt = new Date().toISOString();
        await saveClientProject(p, { materialSelectionDownloadedAt: p.materialSelectionDownloadedAt });
      }
      render();
    });
  }
  const materialNextBtn = document.getElementById("materialNextBtn");
  if(materialNextBtn){
    materialNextBtn.onclick = async ()=>{
      const p = state.clientResult;
      p.progressStep = "production";
      state.productionStep = "transition";
      render();
      await saveClientProject(p, { progressStep: p.progressStep });
    };
  }
  const materialSlotForm = document.getElementById("materialSlotForm");
  if(materialSlotForm){
    materialSlotForm.onsubmit = async (e)=>{
      e.preventDefault();
      const fd = new FormData(e.target);
      const p = state.clientResult;
      p.materialSlotDate = fd.get("date");
      p.materialSlotTime = fd.get("time");
      p.materialSlotType = fd.get("meetingType") || "onsite";
      p.materialSlotBookedAt = new Date().toISOString();
      render();
      await saveClientProject(p, {
        materialSlotDate: p.materialSlotDate, materialSlotTime: p.materialSlotTime,
        materialSlotType: p.materialSlotType, materialSlotBookedAt: p.materialSlotBookedAt
      });
    };
  }
  const changeMaterialSlotBtn = document.getElementById("changeMaterialSlotBtn");
  if(changeMaterialSlotBtn){
    changeMaterialSlotBtn.onclick = async ()=>{
      const p = state.clientResult;
      p.materialSlotDate = ""; p.materialSlotTime = ""; p.materialSlotBookedAt = ""; p.materialSlotType = "";
      p.materialSlotConfirmed = false; p.materialSlotConfirmedAt = "";
      p.materialSelectionCompleted = false; p.materialSelectionCompletedAt = "";
      render();
      await saveClientProject(p, {
        materialSlotDate: "", materialSlotTime: "", materialSlotBookedAt: "", materialSlotType: "",
        materialSlotConfirmed: false, materialSlotConfirmedAt: "",
        materialSelectionCompleted: false, materialSelectionCompletedAt: ""
      });
    };
  }

  const callUsBtn = document.getElementById("callUsBtn");
  if(callUsBtn){
    callUsBtn.onclick = ()=>{
      const p = state.clientResult;
      p.status = "In Discussion";
      p.reconsideredAt = new Date().toISOString();
      p.lostAt = "";
      updateClientProject(p.accessCode, { status: p.status, reconsideredAt: p.reconsideredAt, lostAt: p.lostAt })
        .then(ok=>{ if(!ok) console.error("Could not save status change"); });
      render();
    };
  }

  const reconsiderBtn = document.getElementById("reconsiderBtn");
  if(reconsiderBtn){
    reconsiderBtn.onclick = async ()=>{
      const p = state.clientResult;
      const reqInput = document.getElementById("reconsiderRequirementInput");
      const requirement = (reqInput && reqInput.value.trim()) || "";
      if(!requirement){
        alert("Please tell us a bit about your current requirement before submitting.");
        return;
      }
      reconsiderBtn.disabled = true;
      reconsiderBtn.textContent = "Submitting…";
      p.reconsiderRequestNotes = requirement;
      p.reconsiderRequestedAt = new Date().toISOString();
      p.status = "In Discussion";
      p.reconsideredAt = new Date().toISOString();
      p.lostAt = "";
      const ok = await updateClientProject(p.accessCode, {
        reconsiderRequestNotes: p.reconsiderRequestNotes,
        reconsiderRequestedAt: p.reconsiderRequestedAt,
        status: p.status,
        reconsideredAt: p.reconsideredAt,
        lostAt: p.lostAt
      });
      if(!ok) console.error("Could not save requirement");
      render();
    };
  }

  const submitReferralBtn = document.getElementById("submitReferralBtn");
  if(submitReferralBtn){
    submitReferralBtn.onclick = async ()=>{
      const p = state.clientResult;
      const nameInput = document.getElementById("referralNameInput");
      const contactInput = document.getElementById("referralContactInput");
      const notesInput = document.getElementById("referralNotesInput");
      const name = (nameInput && nameInput.value.trim()) || "";
      const contact = (contactInput && contactInput.value.trim()) || "";
      const notes = (notesInput && notesInput.value.trim()) || "";
      if(!name || !contact){
        alert("Please enter their name and a phone number or email before submitting.");
        return;
      }
      submitReferralBtn.disabled = true;
      submitReferralBtn.textContent = "Submitting…";
      try{
        if(!p.referrals) p.referrals = [];
        p.referrals.push({ id: "r_" + Date.now() + "_" + Math.floor(Math.random()*10000), name, contact, notes, submittedAt: new Date().toISOString() });
        const ok = await updateClientProject(p.accessCode, { referrals: p.referrals });
        if(!ok) throw new Error("Save failed");
        render();
      }catch(e){
        console.error("Could not submit referral", e);
        alert("Something went wrong submitting the referral. Please try again.");
        submitReferralBtn.disabled = false;
        submitReferralBtn.textContent = "Submit Referral";
      }
    };
  }
}
// localStorage), updates made in Studio on a different device won't trigger
// a browser 'storage' event here. Instead we poll periodically, plus
// re-check whenever this tab becomes visible or focused again.
function isRefreshUnsafe(){
  if(!state.clientResult) return false;
  if(state.pendingSaves) return true;
  const p = state.clientResult;
  const step = state.onboardingStep;
  if(p.status === "Lost") return true;
  if(step === "agreement") return true;
  if(step === "payment"){
    const formShowing = p.paymentStatus !== "submitted" && p.paymentStatus !== "verified";
    return formShowing;
  }
  if(step === "kyc") return !p.kycCompleted;
  // Design phase: don't refresh out from under the client mid-way through
  // filling the site measurement or material selection booking form —
  // a refresh rebuilds the form from saved state and wipes anything
  // they've picked but not yet submitted (e.g. opening a native date
  // picker can itself trigger a focus/visibility event).
  const progressStep = p.progressStep || "siteVisit";
  if(progressStep === "siteVisit" && !(p.siteVisitDate && p.siteVisitTime)) return true;
  if(progressStep === "material" && !(p.materialSlotDate && p.materialSlotTime)) return true;
  return false;
}

setInterval(()=>{ if(state.clientResult && !isRefreshUnsafe()) refreshCurrentProject(); }, 8000);
document.addEventListener("visibilitychange", ()=>{
  if(document.hidden) return;
  if(state.clientResult && !isRefreshUnsafe()) refreshCurrentProject();
  else if(!state.clientResult) loadProjects();
});
window.addEventListener("focus", ()=>{
  if(state.clientResult && !isRefreshUnsafe()) refreshCurrentProject();
  else if(!state.clientResult) loadProjects();
});

// If the browser just came back from Cashfree's checkout page, it will have
// ?order_id=...&project_id=... in the URL. Verify the payment actually went
// through (never trust the redirect alone) before marking it as paid.
async function handleCashfreeReturn(){
  const params = new URLSearchParams(window.location.search);
  const orderId = params.get("order_id");
  const projectId = params.get("project_id");
  if(!orderId || !projectId) return;

  // Clean the URL so refreshing doesn't re-trigger this.
  const cleanUrl = window.location.origin + window.location.pathname;
  window.history.replaceState({}, document.title, cleanUrl);

  if(!CASHFREE_BACKEND_URL || CASHFREE_BACKEND_URL.includes("REPLACE-WITH-YOUR-BACKEND-URL")){
    return;
  }

  await loadProjects();
  const p = state.projects.find(x=>x.id===projectId);
  if(!p) return;

  const cashfreeStage = sessionStorage.getItem("zynastyCashfreeStage") || "design";
  sessionStorage.removeItem("zynastyCashfreeStage");

  state.clientResult = p;
  if(cashfreeStage === "production"){
    state.productionStep = "payment";
  } else {
    state.onboardingStep = "payment";
  }
  render();

  try{
    const resp = await fetch(CASHFREE_BACKEND_URL.replace(/\/$/, "") + "/order-status/" + encodeURIComponent(orderId));
    const data = await resp.json();
    if(resp.ok && data.order_status === "PAID"){
      if(cashfreeStage === "production"){
        p.productionPaymentStatus = "verified";
        p.productionPaymentVerifiedAt = new Date().toISOString();
        p.productionPaymentReferenceNote = orderId;
        await updateClientProject(p.accessCode, {
          productionPaymentStatus: p.productionPaymentStatus,
          productionPaymentVerifiedAt: p.productionPaymentVerifiedAt,
          productionPaymentReferenceNote: p.productionPaymentReferenceNote
        });
      } else {
        p.paymentStatus = "verified";
        p.paymentVerifiedAt = new Date().toISOString();
        p.paymentReferenceNote = orderId;
        await updateClientProject(p.accessCode, {
          paymentStatus: p.paymentStatus,
          paymentVerifiedAt: p.paymentVerifiedAt,
          paymentReferenceNote: p.paymentReferenceNote
        });
      }
      state.clientResult = p;
      render();
    } else if(resp.ok){
      // Not yet paid (e.g. customer backed out) - leave status as-is so they
      // can retry with the Pay button or submit manual proof.
      console.log("Cashfree order status:", data.order_status);
    }
  }catch(e){
    console.error("Could not verify Cashfree payment status", e);
  }
}

// On load: fetch projects, then reopen whichever project this browser was
// last signed in to (if any), before checking for a Cashfree return — a
// completed payment redirect should win if both happen to apply at once.
loadProjects().then(async ()=>{
  await loadDesigners();
  const savedCode = loadClientSession();
  if(savedCode) await lookupProjectByCode(savedCode);
  await handleCashfreeReturn();
});
