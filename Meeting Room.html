    const formatDuration = (seconds) => {
      if (!seconds || seconds < 60) return formatTime(seconds);
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = Math.floor(seconds % 60);
      if (h > 0) return `${h}h ${m}m ${s}s`;

    // ============================================================
    //  RECORDING SERVICE
    // ============================================================
    class RecordingService {
      constructor() {
        this.mediaRecorder = null;
        this.audioChunks = [];
        this.stream = null;
        this.isRecording = false;
        this.isPaused = false;
        this.startTime = null;
        this.pausedTime = 0;
        this.timerInterval = null;
        this.onDataAvailable = null;
        this.onStop = null;
        this.onTimerUpdate = null;
        this.audioContext = null;
        this.analyser = null;
        this.volumeInterval = null;
      }

      async start() {
        try {
          this.stream = await navigator.mediaDevices.getUserMedia({
            audio: {
              echoCancellation: true,
              noiseSuppression: true,
              autoGainControl: true,
            }
          });
          this.audioContext = new(window.AudioContext || window.webkitAudioContext)();
          this.analyser = this.audioContext.createAnalyser();
          this.analyser.fftSize = 256;
          const source = this.audioContext.createMediaStreamSource(this.stream);
          source.connect(this.analyser);

          this.mediaRecorder = new MediaRecorder(this.stream);
          this.audioChunks = [];
          this.mediaRecorder.ondataavailable = (e) => {
            if (e.data.size > 0) {
              this.audioChunks.push(e.data);
              if (this.onDataAvailable) this.onDataAvailable(e.data);
            }
          };
          this.mediaRecorder.onstop = () => {
            const blob = new Blob(this.audioChunks, { type: 'audio/webm' });
            if (this.onStop) this.onStop(blob);
            this.isRecording = false;
            this.isPaused = false;
            if (this.timerInterval) clearInterval(this.timerInterval);
            if (this.volumeInterval) clearInterval(this.volumeInterval);
          };
          this.mediaRecorder.start(1000);
          this.isRecording = true;
          this.isPaused = false;
          this.startTime = Date.now();
          this.pausedTime = 0;

          this.timerInterval = setInterval(() => {
            if (this.onTimerUpdate && !this.isPaused) {
              const elapsed = (Date.now() - this.startTime - this.pausedTime) / 1000;
              this.onTimerUpdate(elapsed);
            }
          }, 100);
          this.volumeInterval = setInterval(() => {
            if (this.analyser && this.onTimerUpdate) {
              const data = new Uint8Array(this.analyser.frequencyBinCount);
              this.analyser.getByteFrequencyData(data);
              const avg = data.reduce((a, b) => a + b, 0) / data.length;
              const vol = Math.min(1, avg / 128);
              this.onTimerUpdate(null, vol);
            }
          }, 100);
          return true;
        } catch (err) {
          throw err;
        }
      }

      pause() {
        if (this.isRecording && !this.isPaused && this.mediaRecorder) {
          this.mediaRecorder.pause();
          this.isPaused = true;
          this.pausedTime += Date.now() - this.startTime - this.pausedTime;
          return true;
        }
        return false;
      }

      resume() {
        if (this.isRecording && this.isPaused && this.mediaRecorder) {
          this.mediaRecorder.resume();
          this.isPaused = false;
          this.startTime = Date.now();
          return true;
        }
        return false;
      }

      stop() {
        if (this.mediaRecorder && this.isRecording) {
          this.mediaRecorder.stop();
          this.isRecording = false;
          if (this.timerInterval) clearInterval(this.timerInterval);
          if (this.volumeInterval) clearInterval(this.volumeInterval);
          if (this.stream) {
            this.stream.getTracks().forEach(track => track.stop());
            this.stream = null;
          }
          if (this.audioContext) {
            this.audioContext.close();
            this.audioContext = null;
          }
          return true;
        }
        return false;
      }

      getDuration() {
        if (!this.startTime) return 0;
        const elapsed = (Date.now() - this.startTime - this.pausedTime) / 1000;
        return Math.max(0, elapsed);
      }

      getStatus() {
        if (this.isRecording && this.isPaused) return 'paused';
        if (this.isRecording) return 'recording';
        return 'idle';
      }

      getAudioBlob() {
        if (this.audioChunks.length === 0) return null;
        return new Blob(this.audioChunks, { type: 'audio/webm' });
      }
    }

    // ============================================================

    // ============================================================
    class TranscriptionService {
      constructor() {
        this.recognition = null;
        this.isListening = false;
        this.finalTranscript = '';
        this.interimTranscript = '';
        this.onResult = null;
        this.onEnd = null;
        this.segments = [];
        this.speakerCount = 0;
        this.segmentStartTime = 0;
        this.lastFinalText = '';
      }

      start() {
        return new Promise((resolve, reject) => {
          try {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
              reject(new Error('Speech recognition not supported'));
              return;
            }
            this.recognition = new SpeechRecognition();
            this.recognition.continuous = true;
            this.recognition.interimResults = true;
            this.recognition.lang = 'en-US';
            this.recognition.maxAlternatives = 1;

            this.finalTranscript = '';
            this.interimTranscript = '';
            this.segments = [];
            this.speakerCount = 0;
            this.segmentStartTime = 0;
            this.lastFinalText = '';

            this.recognition.onresult = (e) => {
              let interim = '';
              let final = '';
              for (let i = e.resultIndex; i < e.results.length; i++) {
                const result = e.results[i];
                const transcript = result[0].transcript;
                if (result.isFinal) {
                  final += transcript + ' ';
                  if (this.segmentStartTime === 0) this.segmentStartTime = Date.now();
                  const words = transcript.split(/\s+/);
                  if (words.length > 2 && transcript.trim().length > 3) {
                    const speakerId = (this.speakerCount % 2) + 1;
                    this.speakerCount++;
                    this.segments.push({
                      speaker: `Speaker ${speakerId}`,
                      text: transcript.trim(),
                      timestamp: (Date.now() - this.segmentStartTime) / 1000,
                    });
                  }
                  this.lastFinalText = transcript;
                } else {
                  interim += transcript;
                }
              }
              this.finalTranscript += final;
              this.interimTranscript = interim;
              if (this.onResult) {
                this.onResult({
                  final: this.finalTranscript,
                  interim: this.interimTranscript,
                  segments: this.segments,
                });
              }
            };

            this.recognition.onerror = (e) => {
              console.warn('Speech recognition error:', e.error);
              if (e.error === 'not-allowed') reject(new Error('Microphone permission denied'));
              if (this.onEnd) {
                this.onEnd({ final: this.finalTranscript, segments: this.segments });
              }
            };

            this.recognition.onend = () => {
              this.isListening = false;
              if (this.onEnd) {
                this.onEnd({ final: this.finalTranscript, segments: this.segments });
              }
            };

            this.recognition.start();
            this.isListening = true;
            this.segmentStartTime = Date.now();
            resolve();
          } catch (err) {
            reject(err);
          }
        });
      }

      stop() {
        if (this.recognition && this.isListening) {
          this.recognition.stop();
          this.isListening = false;
          return { final: this.finalTranscript, segments: this.segments };
        }
        return { final: this.finalTranscript || 'No speech detected.', segments: this.segments };
      }

      isSupported() {
        return !!(window.SpeechRecognition || window.webkitSpeechRecognition);
      }
    }

    // ============================================================
    //  GEMINI SERVICE
    // ============================================================
    class GeminiService {
      constructor(apiKey) {
        this.apiKey = apiKey;
        this.baseUrl = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent';
      }

      async generateSummary(transcript, title) {
        if (!this.apiKey) throw new Error('Gemini API key not set.');
        const prompt = `
          You are an AI meeting assistant. Analyze the following meeting transcript and generate a structured JSON summary with the following fields. Return ONLY valid JSON, no extra text.

          Transcript:
          ${transcript}

          Meeting Title (infer from content): ${title || ''}

          Generate JSON with these fields (use empty arrays or null for missing data):
          {
            "title": "Inferred meeting title",
            "executiveSummary": "Brief executive summary (2-3 sentences)",
            "keyPoints": ["Key point 1", "Key point 2"],
            "decisions": ["Decision 1"],
            "actionItems": [{"description": "Action item", "priority": "High/Medium/Low", "assignee": "Name", "dueDate": "YYYY-MM-DD"}],
            "pendingTasks": [{"description": "Task", "priority": "High/Medium/Low", "assignee": "Name", "dueDate": "YYYY-MM-DD"}],
            "deadlines": ["Deadline 1"],
            "budget": "Budget amount mentioned or null",
            "people": ["Name 1"],
            "companies": ["Company 1"],
            "questions": ["Question 1"],
            "risks": ["Risk 1"],
            "nextSteps": ["Step 1"],
            "followUpAgenda": ["Agenda item 1"],
            "sentiment": "Positive/Neutral/Negative",
            "tags": ["tag1", "tag2"],
            "bulletNotes": ["Bullet note 1"],
            "detailedNotes": "Detailed meeting notes (paragraph)",
            "oneMinuteSummary": "Very brief 1-minute summary",
            "emailSummary": "Email-ready summary (plain text, with subject line)",
            "whatsappSummary": "WhatsApp-ready summary (plain text)",
            "clientSummary": "Client-friendly summary (plain text)",
            "importantMoments": ["Moment 1"]
          }

          Ensure all fields are present. For actionItems and pendingTasks, try to infer assignees and due dates.
          Use null for any field that cannot be determined.
        `;

        const response = await fetch(`${this.baseUrl}?key=${this.apiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { temperature: 0.3, maxOutputTokens: 2048, topK: 1, topP: 1 },
          }),
        });
        if (!response.ok) {
          const text = await response.text();
          throw new Error(`Gemini API error (${response.status}): ${text}`);
        }
        const data = await response.json();
        const generatedText = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
        const jsonMatch = generatedText.match(/\{[\s\S]*\}/);
        if (!jsonMatch) throw new Error('Could not parse JSON from Gemini response');
        const result = JSON.parse(jsonMatch[0]);
        const defaults = {
          title: '',
          executiveSummary: '',
          keyPoints: [],
          decisions: [],
          actionItems: [],
          pendingTasks: [],
          deadlines: [],
          budget: null,
          people: [],
          companies: [],
          questions: [],
          risks: [],
          nextSteps: [],
          followUpAgenda: [],
          sentiment: 'Neutral',
          tags: [],
          bulletNotes: [],
          detailedNotes: '',
          oneMinuteSummary: '',
          emailSummary: '',
          whatsappSummary: '',
          clientSummary: '',
          importantMoments: [],
        };
        const merged = { ...defaults, ...result };
        ['keyPoints', 'decisions', 'actionItems', 'pendingTasks', 'deadlines', 'people', 'companies', 'questions', 'risks', 'nextSteps', 'followUpAgenda', 'tags', 'bulletNotes', 'importantMoments'].forEach(key => {
          if (!Array.isArray(merged[key])) merged[key] = [];
        });
        merged.actionItems = merged.actionItems.map(item => ({ ...item, id: generateId(), completed: false }));
        merged.pendingTasks = merged.pendingTasks.map(item => ({ ...item, id: generateId(), completed: false }));
        return merged;
      }
    }

    // ============================================================
    //  STORAGE ADAPTER (Supabase + IndexedDB + Storage + RPC)
    // ============================================================
    class StorageAdapter {
      constructor(supabaseUrl, supabaseAnonKey, bucketName) {
        this.useSupabase = !!(supabaseUrl && supabaseAnonKey);
        this.bucketName = bucketName || 'zynasty.storage';
        if (this.useSupabase) {
          this.supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);
          this.tables = {
            meetings: 'meetings',
            transcripts: 'transcripts',
            summaries: 'summaries',
            actionItems: 'action_items',
            settings: 'settings',
          };
        } else {
          this.dbName = 'AIMeetingAssistant';
          this.version = 2;
          this.db = null;
        }
      }

      async init() {
        if (this.useSupabase) {
          try {
            const { error } = await this.supabase.from(this.tables.meetings).select('id').limit(1);
            if (error) throw error;
            return true;
          } catch (e) {
            console.warn('Supabase connection failed, falling back to IndexedDB', e);
            this.useSupabase = false;
            return this.initIndexedDB();
          }
        } else {
          return this.initIndexedDB();
        }
      }

      initIndexedDB() {
        return new Promise((resolve, reject) => {
          const req = indexedDB.open(this.dbName, this.version);
          req.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains('meetings')) {
              const store = db.createObjectStore('meetings', { keyPath: 'id' });
              store.createIndex('date', 'date');
              store.createIndex('title', 'title');
            }
            if (!db.objectStoreNames.contains('transcripts')) {
              db.createObjectStore('transcripts', { keyPath: 'id' });
            }
            if (!db.objectStoreNames.contains('summaries')) {
              db.createObjectStore('summaries', { keyPath: 'id' });
            }
            if (!db.objectStoreNames.contains('actionItems')) {
              db.createObjectStore('actionItems', { keyPath: 'id' });
            }
            if (!db.objectStoreNames.contains('settings')) {
              db.createObjectStore('settings', { keyPath: 'key' });
            }
          };
          req.onsuccess = (e) => {
            this.db = e.target.result;
            resolve(true);
          };
          req.onerror = (e) => reject(e.target.error);
        });
      }

      async put(store, data) {
        if (this.useSupabase) {
          const table = this.tables[store];
          const { error } = await this.supabase.from(table).upsert(data);
          if (error) throw error;
          return data;
        } else {
          return new Promise((resolve, reject) => {
            const tx = this.db.transaction(store, 'readwrite');
            const req = tx.objectStore(store).put(data);
            req.onsuccess = () => resolve(data);
            req.onerror = () => reject(req.error);
          });
        }
      }

      async get(store, id) {
        if (this.useSupabase) {
          const table = this.tables[store];
          const { data, error } = await this.supabase.from(table).select('*').eq('id', id).single();
          if (error) {
            if (error.code === 'PGRST116') return null;
            throw error;
          }
          return data;
        } else {
          return new Promise((resolve, reject) => {
            const tx = this.db.transaction(store, 'readonly');
            const req = tx.objectStore(store).get(id);
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
          });
        }
      }

      async getAll(store, index = null, value = null) {
        if (this.useSupabase) {
          const table = this.tables[store];
          let query = this.supabase.from(table).select('*');
          if (index && value !== null) query = query.eq(index, value);
          const { data, error } = await query;
          if (error) throw error;
          return data || [];
        } else {
          return new Promise((resolve, reject) => {
            const tx = this.db.transaction(store, 'readonly');
            const req = tx.objectStore(store).getAll();
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
          });
        }
      }

      async delete(store, id) {
        if (this.useSupabase) {
          const table = this.tables[store];
          const { error } = await this.supabase.from(table).delete().eq('id', id);
          if (error) throw error;
        } else {
          return new Promise((resolve, reject) => {
            const tx = this.db.transaction(store, 'readwrite');
            const req = tx.objectStore(store).delete(id);
            req.onsuccess = () => resolve();
            req.onerror = () => reject(req.error);
          });
        }
      }

      async deleteAll(store) {
        if (this.useSupabase) {
          const table = this.tables[store];
          const { error } = await this.supabase.from(table).delete().neq('id', '');
          if (error) throw error;
        } else {
          return new Promise((resolve, reject) => {
            const tx = this.db.transaction(store, 'readwrite');
            const req = tx.objectStore(store).clear();
            req.onsuccess = () => resolve();
            req.onerror = () => reject(req.error);
          });
        }
      }

      async getByIndex(store, index, value) {
        if (this.useSupabase) {
          const table = this.tables[store];
          const { data, error } = await this.supabase.from(table).select('*').eq(index, value);
          if (error) throw error;
          return data || [];
        } else {
          const all = await this.getAll(store);
          return all.filter(item => item[index] === value);
        }
      }

      async uploadAudio(meetingId, blob) {
        if (!this.useSupabase) {
          return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(blob);
          });
        }
        const filePath = `meetings/${meetingId}/audio.webm`;
        const { error } = await this.supabase.storage.from(this.bucketName).upload(filePath, blob, {
          contentType: 'audio/webm',
          cacheControl: '3600',
          upsert: true,
        });
        if (error) throw error;
        const { data } = this.supabase.storage.from(this.bucketName).getPublicUrl(filePath);
        return data.publicUrl;
      }

      async searchMeetings(query) {
        if (!this.useSupabase) {
          const all = await this.getAll('meetings');
          const q = query.toLowerCase();
          return all.filter(m =>
            m.title?.toLowerCase().includes(q) ||
            m.transcript?.toLowerCase().includes(q) ||
            (m.tags || []).some(t => t.toLowerCase().includes(q)) ||
            (m.people || []).some(p => p.toLowerCase().includes(q)) ||
            (m.companies || []).some(c => c.toLowerCase().includes(q))
          );
        }
        const { data, error } = await this.supabase.rpc('search_meetings', { search_query: query });
        if (error) throw error;
        const ids = data.map(d => d.id);
        if (ids.length === 0) return [];
        const { data: meetings, error: err2 } = await this.supabase.from(this.tables.meetings).select('*').in('id', ids);
        if (err2) throw err2;
        const rankMap = {};
        data.forEach(d => { rankMap[d.id] = d.rank; });
        meetings.sort((a, b) => (rankMap[b.id] || 0) - (rankMap[a.id] || 0));
        return meetings;
      }
    }

        case 'SET_VIEW':
          return { ...state, view: action.payload };

          return { ...state, currentMeetingId: action.payload };
        case 'SET_DARK_MODE':

        case 'SET_SETTINGS':
          return { ...state, settings: { ...state.settings, ...action.payload } };
        case 'SET_SEARCH_RESULTS':

                settings = { ...settings, ...parsed };

            }

            const adapter = new StorageAdapter(settings.supabaseUrl, settings.supabaseAnonKey, settings.storageBucket);

            storageRef.current = adapter;

            let meetings = await adapter.getAll('meetings');
            meetings = meetings.sort((a, b) => (b.date || 0) - (a.date || 0));
            if (isMounted) dispatch({ type: 'SET_MEETINGS', payload: meetings });

            const storedSettings = await adapter.get('settings', 'appSettings');
            if (storedSettings && isMounted) {
              const merged = { ...settings, ...storedSettings };
              dispatch({ type: 'SET_SETTINGS', payload: merged });
              settings = merged;
              localStorage.setItem('aiMeetingSettings', JSON.stringify(merged));
            }

            if (settings.geminiApiKey) {

        timeoutId = setTimeout(() => {
          if (isMounted && !initialized) {

        return () => {

      useEffect(() => {
        if (!storageRef.current) return;
        const saveSettings = async () => {

            const adapter = new StorageAdapter(

            await adapter.init();
            storageRef.current = adapter;
          } catch (e) {
            console.error('Error saving settings:', e);
          }
        };
        saveSettings();
      }, [state.settings]);

      const addMeeting = async (meeting) => {
        const adapter = storageRef.current;
        if (!adapter) throw new Error('Storage not initialized');

      const updateMeeting = async (meeting) => {

      const deleteMeeting = async (id) => {

      const saveActionItems = async (meetingId, items) => {

    const NewMeeting = () => {
      const { state, dispatch, addMeeting, generateSummary, saveTranscript, saveSummary, saveActionItems, uploadAudio } =
      useApp();

      const [status, setStatus] = useState('idle');
      const [duration, setDuration] = useState(0);
      const [transcript, setTranscript] = useState('');
      const [transcriptSegments, setTranscriptSegments] = useState([]);
      const [volume, setVolume] = useState(0);
      const [meetingTitle, setMeetingTitle] = useState('');
      const [isGenerating, setIsGenerating] = useState(false);
      const [generatedSummary, setGeneratedSummary] = useState(null);
      const [showSummary, setShowSummary] = useState(false);
      const [audioBlob, setAudioBlob] = useState(null);
      const [isSaving, setIsSaving] = useState(false);

        statusRef.current = status;

      useEffect(() => {

          if (time !== null && statusRef.current !== 'paused') {
            setDuration(time);
          }
          if (vol !== undefined) {
            setVolume(vol);
          }
        };
        recordingService.current.onStop = (blob) => {
          setAudioBlob(blob);
          setStatus('processing');
          if (transcriptionService.current && transcriptionService.current.isListening) {
            const result = transcriptionService.current.stop();
            setTranscript(result.final);
            setTranscriptSegments(result.segments || []);
            setStatus('done');
          } else {
            setTimeout(() => {
              setStatus('done');
            }, 500);
          }
        };

        transcriptionService.current = new TranscriptionService();
        transcriptionService.current.onResult = (result) => {
          setTranscript(result.final);
          setTranscriptSegments(result.segments || []);
        };
        transcriptionService.current.onEnd = (result) => {
          setTranscript(result.final);
          setTranscriptSegments(result.segments || []);
          if (statusRef.current === 'recording' || statusRef.current === 'paused') {
            setStatus('done');
          }

        return () => {
          if (recordingService.current) {
            recordingService.current.stop();
          }

              "Let's review the budget allocation for the next quarter.",
              "I think we should prioritize the mobile app launch.",
              "We've seen a 20% increase in user engagement since last month.",
              "The timeline is tight, but I believe we can deliver by December.",
              "Let's assign action items and follow up next week.",

                    speaker: `Speaker ${(idx % 2) + 1}`,
                    text: mockTexts[idx],
                    timestamp: idx * 3,

                  idx++;

            payload: { message: 'Recording started...', severity: 'success' }

                sx: { borderRadius: '12px', boxShadow: '0 8px 32px rgba(0,0,0,0.15)' }
              },
              state.snackbar.message
            )
          )
        )
      );
    };

    // ============================================================
    //  BOOTSTRAP - RENDER THE APPLICATION
    // ============================================================
    const root = createRoot(document.getElementById('root'));
    root.render(
      React.createElement(
        React.StrictMode, null,
        React.createElement(
          AppProvider, null,
          React.createElement(App)
        )
      )
    );
  </script>
</body>
</html>
